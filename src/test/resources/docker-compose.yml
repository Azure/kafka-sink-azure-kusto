services:
  kafka:
    image: quay.io/strimzi/kafka:0.49.1-kafka-4.1.1
    command:
      - sh
      - -c
      - |
        # Create KRaft server properties file
        cat > /tmp/server.properties << 'EOF'
        process.roles=broker,controller
        node.id=1
        controller.quorum.voters=1@localhost:9093
        controller.listener.names=CONTROLLER
        listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
        listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
        advertised.listeners=PLAINTEXT://kafka:9092
        inter.broker.listener.name=PLAINTEXT
        log.dirs=/tmp/kraft-combined-logs
        offsets.topic.replication.factor=1
        transaction.state.log.replication.factor=1
        transaction.state.log.min.isr=1
        default.replication.factor=1
        min.insync.replicas=1
        num.network.threads=3
        num.io.threads=8
        socket.send.buffer.bytes=102400
        socket.receive.buffer.bytes=102400
        socket.request.max.bytes=104857600
        num.partitions=1
        num.recovery.threads.per.data.dir=1
        log.retention.hours=168
        log.segment.bytes=1073741824
        log.retention.check.interval.ms=300000
        EOF
        
        # Generate cluster ID
        CLUSTER_ID=$(bin/kafka-storage.sh random-uuid)
        echo "Generated cluster ID: $CLUSTER_ID"
        
        # Format storage directory
        bin/kafka-storage.sh format --config /tmp/server.properties --cluster-id "$CLUSTER_ID"
        
        # Start Kafka
        bin/kafka-server-start.sh /tmp/server.properties
    environment:
      LOG_DIR: /tmp/logs
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
    ports:
      - "9092:9092"
      - "9093:9093"
    networks:
      - strimzi-net

  kafka-connect:
    build:
      context: ../../../  # Point to the project root where target/ exists
      dockerfile: src/test/resources/Dockerfile.kafka-connect
    command:
      - sh
      - -c
      - |
        echo "Waiting for Kafka to be ready..."
        sleep 30
        echo "Starting Kafka Connect..."
        bin/connect-distributed.sh /tmp/connect-distributed.properties
    environment:
      LOG_DIR: /tmp/logs
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"
    volumes:
      - ./connect-distributed.properties:/tmp/connect-distributed.properties:ro
    ports:
      - "8083:8083"
    networks:
      - strimzi-net
    depends_on:
      - kafka
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

networks:
  strimzi-net:
    driver: bridge
