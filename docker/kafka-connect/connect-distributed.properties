# Kafka Connect distributed mode properties.
# These are overridden by environment variables in docker-compose.yml where needed.

bootstrap.servers=kafka:9092

group.id=kusto-connect-cluster

key.converter=org.apache.kafka.connect.storage.StringConverter
value.converter=org.apache.kafka.connect.storage.StringConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

# Internal converters (deprecated but still required in some versions)
internal.key.converter=org.apache.kafka.connect.json.JsonConverter
internal.value.converter=org.apache.kafka.connect.json.JsonConverter

offset.storage.topic=connect-offsets
offset.storage.replication.factor=1
offset.storage.partitions=1

config.storage.topic=connect-configs
config.storage.replication.factor=1

status.storage.topic=connect-status
status.storage.replication.factor=1

offset.flush.interval.ms=10000

# Plugin path where the Kusto Sink Connector JAR is installed
plugin.path=/opt/kafka/plugins

# Allow per-connector consumer overrides
connector.client.config.override.policy=All

# REST API
rest.advertised.host.name=kafka-connect
rest.port=8083
